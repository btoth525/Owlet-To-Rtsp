# Owlet-To-Rtsp — full stack for Unraid (Compose Manager plugin).
#
#   redroid       headless Android running the Owlet app 24/7
#   owlet-bridge  go2rtc + adb + scrcpy + ffmpeg(NVENC) + watchdog -> RTSP
#
# Frigate is intentionally NOT included (most people already run it). Point your
# existing Frigate at  rtsp://<unraid-ip>:8554/owlet  — see frigate/owlet.camera.yml.
# An optional Frigate service is included, commented out, at the bottom.
#
# Copy .env.example -> .env and adjust before `docker compose up -d`.

name: owlet-to-rtsp

services:
  redroid:
    image: redroid/redroid:11.0.0-latest
    container_name: owlet-redroid
    privileged: true                     # required: binder/ashmem access
    restart: unless-stopped
    volumes:
      # Persists the app install + login across restarts.
      - ${APPDATA:-/mnt/user/appdata/owlet}/redroid-data:/data
    command:
      - androidboot.redroid_gpu_mode=guest   # software render = most compatible
      - androidboot.redroid_width=1280
      - androidboot.redroid_height=720
      - androidboot.redroid_dpi=240
    ports:
      - "5555:5555"                      # adb, for the one-time install/login
    networks: [owlet-net]

  owlet-bridge:
    build: ./bridge
    image: ghcr.io/btoth525/owlet-bridge:latest
    container_name: owlet-bridge
    restart: unless-stopped
    depends_on: [redroid]
    runtime: nvidia                      # NVENC; needs Unraid Nvidia-Driver plugin
    environment:
      ADB_DEVICE: redroid:5555
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: all
      OWLET_PACKAGE: ${OWLET_PACKAGE:-com.owletcare.owletcare}
      SCREEN_SIZE: ${SCREEN_SIZE:-1280x720}
      SCREEN_DENSITY: ${SCREEN_DENSITY:-240}
      FPS: ${FPS:-15}
      CAPTURE_METHOD: ${CAPTURE_METHOD:-auto}
      ENCODER: ${ENCODER:-auto}
      BITRATE: ${BITRATE:-4000000}
      CROP: ${CROP:-}
      TAP_X: ${TAP_X:-640}
      TAP_Y: ${TAP_Y:-360}
      WATCHDOG_INTERVAL: ${WATCHDOG_INTERVAL:-120}
      WATCHDOG_APP_GUARD: ${WATCHDOG_APP_GUARD:-true}
    ports:
      - "8554:8554"                      # RTSP  -> Frigate / VLC
      - "1984:1984"                      # go2rtc web UI / API
      - "8555:8555/tcp"                  # WebRTC
      - "8555:8555/udp"
    healthcheck:
      # "is RTSP actually producing video?" — restart the bridge if not.
      test: ["CMD-SHELL", "ffprobe -rtsp_transport tcp -i rtsp://127.0.0.1:8554/owlet -show_streams -select_streams v -loglevel error -read_intervals %+#1 >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks: [owlet-net]

  # ---- OPTIONAL: run Frigate here too. Uncomment to use. ------------------
  # frigate:
  #   image: ghcr.io/blakeblackshear/frigate:stable
  #   container_name: owlet-frigate
  #   restart: unless-stopped
  #   shm_size: "256mb"
  #   runtime: nvidia                    # NVDEC decode + (optionally) TensorRT detect
  #   environment:
  #     NVIDIA_VISIBLE_DEVICES: all
  #     NVIDIA_DRIVER_CAPABILITIES: all
  #   volumes:
  #     - ${APPDATA:-/mnt/user/appdata/owlet}/frigate-config:/config
  #     - ${APPDATA:-/mnt/user/appdata/owlet}/frigate-media:/media/frigate
  #   ports:
  #     - "5000:5000"
  #   depends_on: [owlet-bridge]
  #   networks: [owlet-net]

networks:
  owlet-net:
    name: owlet-net
