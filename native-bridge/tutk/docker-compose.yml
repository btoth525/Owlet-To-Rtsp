# owlet-native-bridge — turnkey, once the capture has filled in the Owlet
# specifics. Enter your Owlet login, get RTSP/WebRTC/HLS + a web UI. The
# wyze-bridge experience, for Owlet/Kalay.

name: owlet-native-bridge

services:
  owlet-native:
    build: .
    image: ghcr.io/btoth525/owlet-native-bridge:latest
    container_name: owlet-native
    restart: unless-stopped
    environment:
      # The only things a user should need to set:
      OWLET_EMAIL: ${OWLET_EMAIL:?set your Owlet account email}
      OWLET_PASSWORD: ${OWLET_PASSWORD:?set your Owlet account password}
      OWLET_REGION: ${OWLET_REGION:-world}        # world | europe
      OWLET_CAMERA_NAME: ${OWLET_CAMERA_NAME:-}   # optional: pick one camera

      # Filled once from the capture (or shipped baked-in once known):
      OWLET_AV_ACCOUNT: ${OWLET_AV_ACCOUNT:-admin}
      OWLET_AV_PASSWORD: ${OWLET_AV_PASSWORD:-}
      OWLET_IOTYPE_START: ${OWLET_IOTYPE_START:-0x01FF}
      OWLET_START_PAYLOAD_HEX: ${OWLET_START_PAYLOAD_HEX:-00000000}

      TUTK_LIB_DIR: /app/libs/x86_64
      LD_LIBRARY_PATH: /app/libs/x86_64
    volumes:
      # Mount the extracted SDK libs (or bake them into the image).
      - ./libs:/app/libs:ro
    ports:
      - "1984:1984"   # web UI
      - "8554:8554"   # RTSP
      - "8555:8555/tcp"
      - "8555:8555/udp"
    networks: [owlet-net]

networks:
  owlet-net:
    external: true
    name: owlet-net
