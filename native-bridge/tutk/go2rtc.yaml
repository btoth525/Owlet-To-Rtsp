# go2rtc serves the native Owlet stream and gives you the wyze-bridge-style
# web UI: stream tiles + ready-made RTSP / WebRTC / MSE / HLS links per camera.
#
#   Web UI:  http://<host>:1984
#   RTSP:    rtsp://<host>:8554/owlet
#   WebRTC:  http://<host>:1984/webrtc.html?src=owlet

log:
  level: info

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"

streams:
  owlet:
    # The TUTK client writes raw H.264 to stdout; go2rtc wraps + restreams it
    # and supervises/restarts on exit.
    - exec:python3 /app/owlet_tutk_client.py#killsignal=15#killtimeout=5
