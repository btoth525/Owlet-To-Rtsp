# go2rtc serves the camera and provides the video web UI (:1984) with
# RTSP / WebRTC / MSE / HLS links. The control panel (webapp.py) runs on :8088.

log:
  level: info

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"

streams:
  owlet:
    # Baked-in fallback (used only when /config isn't writable so the generated
    # config can't be produced). Delegates to the same run-cam.sh as the normal
    # path so it gets audio/talk/sensors AND the pipeline-reaping on restart that
    # an inline `bash -c '… | …'` lacked. run-cam.sh falls back to
    # /config/owlet.env when no per-camera env exists. #killsignal so go2rtc
    # SIGTERMs (not SIGKILLs) and the reaping trap can run.
    - exec:/app/run-cam.sh owlet {output}#killsignal=15&killtimeout=5
