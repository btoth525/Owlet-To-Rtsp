# go2rtc serves the camera and provides the video web UI (:1984) with
# RTSP / WebRTC / MSE / HLS links. The control panel (webapp.py) runs on :8088.

log:
  level: info

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"

streams:
  owlet:
    # Baked-in single-cam fallback (used only when /config isn't writable, so the
    # generated config can't be produced). Proven :latest pipeline — note the
    # explicit absence of `-fflags nobuffer` (it would emit RTSP before the H.264
    # SPS is parsed, so consumers decode nothing).
    - exec:bash -c 'set -a; [ -f /config/owlet.env ] && . /config/owlet.env; python3 /app/tutk_client.py 2>>/config/tutk.log | ffmpeg -hide_banner -loglevel warning -fflags +genpts -use_wallclock_as_timestamps 1 -analyzeduration 5000000 -probesize 5000000 -f h264 -i - -c copy -f rtsp -rtsp_transport tcp {output}'
