# go2rtc serves the camera and provides the video web UI (:1984) with
# RTSP / WebRTC / MSE / HLS links. The control panel (webapp.py) runs on :8088.

log:
  level: info

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"

streams:
  owlet:
    # Source the UI-saved creds, run the TUTK client (raw H.264 on stdout), and
    # let ffmpeg repackage it into RTSP that go2rtc ingests at {output}. go2rtc
    # supervises + restarts the whole pipeline.
    - exec:bash -c 'set -a; [ -f /config/owlet.env ] && . /config/owlet.env; python3 /app/tutk_client.py | ffmpeg -hide_banner -loglevel warning -fflags nobuffer -f h264 -i - -c copy -f rtsp -rtsp_transport tcp {output}'
