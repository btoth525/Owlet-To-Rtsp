# Standalone mitmproxy for capturing the Owlet cloud-auth flow.
# Web UI at http://<host>:8081, proxy on :8080.
#
#   docker compose up        # then point the Android proxy at <host>:8080
#
# The CA is generated into ./mitm-data on first run; setup-redroid-mitm.sh
# installs it into the redroid system store.

name: owlet-mitm

services:
  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    container_name: owlet-mitm
    command: >
      mitmweb --web-host 0.0.0.0 --web-port 8081
      --listen-port 8080
      -s /scripts/owlet_addon.py
    environment:
      OWLET_CAP_DIR: /captures
    ports:
      - "8080:8080"   # proxy
      - "8081:8081"   # web UI
    volumes:
      - ./owlet_addon.py:/scripts/owlet_addon.py:ro
      - ./captures:/captures
      - ./mitm-data:/home/mitmproxy/.mitmproxy   # persists the CA
    restart: unless-stopped
