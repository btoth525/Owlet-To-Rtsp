name: Build image

# Builds the Owlet→RTSP bridge image and publishes it to GHCR so the Unraid
# template / docker run command can pull a ready-made image:
#
#   ghcr.io/<owner>/owlet-bridge-native

on:
  push:
    branches: ["**"]
    paths:
      - "native-bridge/bridge/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # The native Owlet/Kalay bridge — Bionic (Termux) runtime so the
          # Android TUTK libs actually load on x86_64.
          - name: owlet-bridge-native
            context: ./native-bridge/bridge
            dockerfile: ./native-bridge/bridge/Dockerfile.bionic
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
