name: Build images

# Builds the deployable images and publishes them to GHCR so the Unraid
# templates / docker run commands can pull ready-made images.
#
#   ghcr.io/<owner>/owlet-bridge    screen-capture bridge (redroid display -> RTSP)
#   ghcr.io/<owner>/owlet-capture   one-time TUTK/Kalay capture appliance

on:
  push:
    branches: ["**"]
    paths:
      - "bridge/**"
      - "native-bridge/mitm/**"
      - "native-bridge/probe/**"
      - "native-bridge/capture/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: owlet-bridge
            context: ./bridge
            dockerfile: ./bridge/Dockerfile
          - name: owlet-capture
            context: ./native-bridge
            dockerfile: ./native-bridge/capture/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
