name: Build owlet-bridge image

# Builds bridge/Dockerfile and publishes it to GHCR so the Unraid template
# (and docker-compose) can pull a ready-made image instead of building locally.

on:
  push:
    branches: ["**"]
    paths:
      - "bridge/**"
      - ".github/workflows/build-bridge.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/owlet-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bridge
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
